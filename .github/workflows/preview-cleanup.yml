name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: alpha-morrisoncole-previews

jobs:
  cleanup:
    name: Delete Preview
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::427319529420:role/alpha-morrisoncole-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete preview from S3
        run: |
          aws s3 rm s3://${{ env.S3_BUCKET }}/pr-${{ github.event.pull_request.number }}/ --recursive

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          sparse-checkout: .github/scripts

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '25.8.2'

      - name: Install script dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Deactivate deployment environment
        run: node .github/scripts/deactivate-deployment.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
