name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: alpha-morrisoncole-previews

jobs:
  cleanup:
    name: Delete Preview
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: arn:aws:iam::427319529420:role/alpha-morrisoncole-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete preview from S3
        run: |
          aws s3 rm s3://${{ env.S3_BUCKET }}/pr-${{ github.event.pull_request.number }}/ --recursive

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/scripts

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '25.8.2'

      - name: Install script dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Deactivate deployment environment
        run: node .github/scripts/deactivate-deployment.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
